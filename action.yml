name: 'VibeDiff'
description: 'Analyze PRs for AI patterns, style drift, and idiom contamination'
branding:
  icon: 'search'
  color: 'orange'

inputs:
  version:
    description: 'VibeDiff version to install'
    default: 'latest'
  fingerprint:
    description: 'Path to fingerprint.json (enables style drift detection)'
    default: ''
  anthropic_api_key:
    description: 'Anthropic API key for LLM synthesis (optional)'
    default: ''
  comment:
    description: 'Post review as a PR comment (in addition to step summary)'
    default: 'true'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install VibeDiff
      shell: bash
      run: |
        if [ "${{ inputs.version }}" = "latest" ]; then
          pip install "vibediff[llm]"
        else
          pip install "vibediff[llm]==${{ inputs.version }}"
        fi

    - name: Set up fingerprint
      if: inputs.fingerprint != ''
      shell: bash
      run: |
        mkdir -p .vibediff-cache
        cp "${{ inputs.fingerprint }}" .vibediff-cache/fingerprint.json

    - name: Run VibeDiff
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        ANTHROPIC_API_KEY: ${{ inputs.anthropic_api_key }}
      run: |
        FLAGS=""
        if [ -n "$ANTHROPIC_API_KEY" ]; then
          FLAGS="$FLAGS --synthesize"
        fi
        if [ "${{ inputs.comment }}" = "true" ]; then
          FLAGS="$FLAGS --comment"
        fi
        PR="${{ github.event.pull_request.number }}"
        vibediff review --pr "$PR" --format md $FLAGS >> "$GITHUB_STEP_SUMMARY"
